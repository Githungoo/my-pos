<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hardware POS</title>
    <!-- Tailwind CSS สำหรับตกแต่ง -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- FontAwesome สำหรับไอคอน -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 2px solid #ea580c; color: #ea580c; font-weight: bold; }
        /* ซ่อน Scrollbar บนมือถือเพื่อความสวยงาม */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen flex flex-col overflow-hidden">

    <!-- ================= Toast Notification ================= -->
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 bg-green-500 text-white px-4 py-2 rounded-full shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none flex items-center space-x-2">
        <i id="toast-icon" class="fas fa-check-circle"></i>
        <span id="toast-msg" class="text-sm font-medium">ข้อความ</span>
    </div>

    <!-- ================= หน้าเข้าสู่ระบบ (Auth Screen) ================= -->
    <div id="auth-screen" class="flex-1 flex flex-col items-center justify-center p-6 bg-slate-800 h-full">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-xl p-6">
            <div class="text-center mb-6">
                <div class="bg-orange-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-tools text-2xl text-orange-600"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">Hardware POS</h1>
                <p id="auth-title" class="text-gray-500 mt-1 text-sm">เข้าสู่ระบบพนักงาน</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="อีเมล (employee@store.com)" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none">
                <input type="password" id="password" placeholder="รหัสผ่าน" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none">
                <button id="btn-login" onclick="handleLogin()" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 rounded-xl transition">เข้าสู่ระบบ</button>
                <button id="btn-register" onclick="handleRegister()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 rounded-xl transition hidden">ลงทะเบียนใหม่</button>
            </div>
            <div class="mt-4 text-center">
                <button onclick="toggleAuthMode()" id="toggle-auth-btn" class="text-sm text-orange-600 font-medium">ไม่มีบัญชี? สมัครใช้งาน</button>
            </div>
        </div>
    </div>

    <!-- ================= หน้าหลัก POS (Main Screen) ================= -->
    <div id="app-screen" class="hidden flex-col h-full">
        <!-- Header -->
        <header class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-md z-10">
            <div class="flex items-center space-x-2">
                <i class="fas fa-store text-orange-500"></i>
                <h1 class="font-bold text-lg">Hardware POS</h1>
            </div>
            <div class="flex items-center space-x-3">
                <span id="user-email" class="text-xs bg-slate-800 px-2 py-1 rounded-full truncate max-w-[120px]">user@mail.com</span>
                <button onclick="handleLogout()" class="text-gray-300 hover:text-white"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <!-- Mobile Tabs -->
        <div class="flex bg-white shadow-sm z-10 shrink-0">
            <button onclick="switchTab('products')" id="tab-products" class="flex-1 py-3 text-center tab-active transition">
                <i class="fas fa-box-open mr-1"></i> สินค้า
            </button>
            <button onclick="switchTab('cart')" id="tab-cart" class="flex-1 py-3 text-center text-gray-500 transition relative">
                <i class="fas fa-shopping-cart mr-1"></i> ตะกร้า
                <span id="cart-badge" class="absolute top-2 right-4 bg-orange-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
            </button>
        </div>

        <!-- Content Area -->
        <div class="flex-1 overflow-hidden relative">
            
            <!-- แท็บสินค้า (Products) -->
            <div id="view-products" class="absolute inset-0 flex flex-col bg-gray-50 h-full overflow-hidden">
                <div class="p-3 shrink-0">
                    <div class="relative">
                        <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                        <input type="text" id="search-input" oninput="renderProducts()" placeholder="ค้นหาสินค้า หรือ บาร์โค้ด..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-xl outline-none focus:border-orange-500 text-sm">
                    </div>
                </div>
                <!-- รายการสินค้า -->
                <div id="products-container" class="flex-1 overflow-y-auto p-3 grid grid-cols-2 gap-3 pb-6">
                    <!-- สินค้าถูกสร้างด้วย JS -->
                </div>
            </div>

            <!-- แท็บตะกร้า (Cart) -->
            <div id="view-cart" class="absolute inset-0 bg-white flex flex-col h-full hidden">
                <div id="cart-container" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50">
                    <!-- ตะกร้าถูกสร้างด้วย JS -->
                </div>
                
                <!-- สรุปยอดและปุ่มจ่ายเงิน -->
                <div class="p-4 bg-white border-t border-gray-200 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                    <div class="flex justify-between items-center mb-1 text-sm text-gray-500">
                        <span>จำนวนสินค้า</span>
                        <span id="cart-total-items">0 ชิ้น</span>
                    </div>
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-lg font-bold">ยอดรวม</span>
                        <span id="cart-total-price" class="text-2xl font-bold text-orange-600">฿0.00</span>
                    </div>
                    <button onclick="openCheckoutModal()" id="btn-checkout" disabled class="w-full bg-slate-900 text-white font-bold py-3.5 rounded-xl flex items-center justify-center space-x-2 disabled:opacity-50 transition">
                        <i class="fas fa-receipt"></i>
                        <span>ชำระเงิน</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= Modal เลือกวิธีชำระเงิน ================= -->
    <div id="checkout-modal" class="fixed inset-0 bg-black bg-opacity-60 z-50 hidden flex items-end sm:items-center justify-center">
        <div class="bg-white w-full sm:w-96 rounded-t-3xl sm:rounded-3xl p-6 pb-10 sm:pb-6 transform transition-transform translate-y-full" id="checkout-panel">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">เลือกวิธีชำระเงิน</h2>
                <button onclick="closeCheckoutModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <div class="text-center mb-6">
                <p class="text-sm text-gray-500">ยอดสุทธิที่ต้องชำระ</p>
                <p id="modal-total-price" class="text-3xl font-bold text-orange-600 mt-1">฿0.00</p>
            </div>

            <div class="space-y-3">
                <button onclick="processCheckout('CASH')" class="w-full p-4 border-2 border-gray-200 rounded-xl flex items-center hover:border-orange-500 active:bg-orange-50 transition text-left">
                    <i class="fas fa-money-bill-wave text-green-500 text-xl w-8"></i>
                    <span class="font-bold text-gray-700">เงินสด</span>
                </button>
                <button onclick="processCheckout('PROMPTPAY')" class="w-full p-4 border-2 border-gray-200 rounded-xl flex items-center hover:border-blue-500 active:bg-blue-50 transition text-left">
                    <i class="fas fa-qrcode text-blue-800 text-xl w-8"></i>
                    <span class="font-bold text-gray-700">พร้อมเพย์</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. ตั้งค่า Supabase
        // ==========================================
        const SUPABASE_URL = 'https://trkdlbpkyhbdjvwlooqf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRya2RsYnBreWhiZGp2d2xvb3FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NDAxNTIsImV4cCI6MjA4OTUxNjE1Mn0._XUQvEhqQwil2r_T14xc_V9JAqrfeV5Sm06sUF4M4Os';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // State ของระบบ
        let currentUser = null;
        let products = [];
        let cart = [];
        let isLoginMode = true;

        // ==========================================
        // 2. ระบบ UI และ Utility
        // ==========================================
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            document.getElementById('toast-msg').innerText = message;
            
            if(isError) {
                toast.classList.replace('bg-green-500', 'bg-red-500');
                icon.className = 'fas fa-exclamation-circle';
            } else {
                toast.classList.replace('bg-red-500', 'bg-green-500');
                icon.className = 'fas fa-check-circle';
            }

            toast.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => toast.classList.add('opacity-0', 'pointer-events-none'), 3000);
        }

        function formatMoney(amount) {
            return new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB' }).format(amount);
        }

        // ==========================================
        // 3. ระบบ Authentication (ล็อกอิน/สมัคร)
        // ==========================================
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                document.getElementById('user-email').innerText = currentUser.email;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.replace('hidden', 'flex');
                fetchProducts();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.replace('flex', 'hidden');
            }
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('btn-login').classList.toggle('hidden');
            document.getElementById('btn-register').classList.toggle('hidden');
            document.getElementById('auth-title').innerText = isLoginMode ? 'เข้าสู่ระบบพนักงาน' : 'ลงทะเบียนพนักงานใหม่';
            document.getElementById('toggle-auth-btn').innerText = isLoginMode ? 'ไม่มีบัญชี? สมัครใช้งาน' : 'มีบัญชีแล้ว? เข้าสู่ระบบ';
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return showToast('กรุณากรอกข้อมูลให้ครบ', true);
            
            const btn = document.getElementById('btn-login');
            btn.innerText = 'กำลังตรวจสอบ...';
            
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            btn.innerText = 'เข้าสู่ระบบ';
            
            if (error) showToast(error.message, true);
            else { showToast('เข้าสู่ระบบสำเร็จ'); checkSession(); }
        }

        async function handleRegister() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return showToast('กรุณากรอกข้อมูลให้ครบ', true);
            
            const btn = document.getElementById('btn-register');
            btn.innerText = 'กำลังดำเนินการ...';

            const { error } = await supabase.auth.signUp({ email, password });
            btn.innerText = 'ลงทะเบียนใหม่';

            if (error) showToast(error.message, true);
            else { showToast('สมัครสำเร็จ! (ได้รับสิทธิ์ Employee อัตโนมัติ)'); checkSession(); }
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            currentUser = null;
            cart = [];
            updateCartUI();
            checkSession();
        }

        // ==========================================
        // 4. ระบบดึงข้อมูลสินค้า และ จัดการตะกร้า
        // ==========================================
        async function fetchProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '<div class="col-span-2 text-center text-gray-400 py-10"><i class="fas fa-spinner fa-spin text-2xl mb-2"></i><br>กำลังโหลด...</div>';
            
            const { data, error } = await supabase
                .from('product_variants')
                .select('id, variant_name, price, barcode, unit_of_measure, current_inventory(stock_level)')
                .eq('is_active', true);

            if (error) {
                showToast('ดึงข้อมูลผิดพลาด: ' + error.message, true);
            } else {
                products = data || [];
                renderProducts();
            }
        }

        function renderProducts() {
            const searchText = document.getElementById('search-input').value.toLowerCase();
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            const filtered = products.filter(p => 
                p.variant_name.toLowerCase().includes(searchText) || 
                (p.barcode && p.barcode.includes(searchText))
            );

            if(filtered.length === 0) {
                container.innerHTML = '<div class="col-span-2 text-center text-gray-400 py-10"><i class="fas fa-box-open text-3xl mb-2 opacity-50"></i><br>ไม่พบสินค้า</div>';
                return;
            }

            filtered.forEach(p => {
                // จัดการโครงสร้าง JSON ย่อยของ Supabase ที่อาจเป็น array หรือ object
                let stock = 0;
                if(p.current_inventory) {
                    stock = Array.isArray(p.current_inventory) ? 
                            (p.current_inventory[0]?.stock_level || 0) : 
                            (p.current_inventory.stock_level || 0);
                }
                const isOutOfStock = stock <= 0;

                const div = document.createElement('div');
                div.className = `bg-white rounded-xl p-3 shadow-sm border ${isOutOfStock ? 'opacity-50 grayscale' : 'border-gray-200 active:border-orange-500'} flex flex-col`;
                div.innerHTML = `
                    <div class="h-16 bg-gray-50 rounded-lg flex items-center justify-center mb-2">
                        <i class="fas fa-tools text-gray-300 text-xl"></i>
                    </div>
                    <div class="text-xs text-gray-500 mb-1 line-clamp-2 h-8 font-medium">${p.variant_name}</div>
                    <div class="mt-auto flex justify-between items-end">
                        <span class="font-bold text-orange-600 text-sm">${formatMoney(p.price)}</span>
                        <span class="text-[10px] bg-gray-100 px-1.5 py-0.5 rounded text-gray-600">${stock} ${p.unit_of_measure}</span>
                    </div>
                `;
                
                if(!isOutOfStock) {
                    div.onclick = () => addToCart(p);
                }
                container.appendChild(div);
            });
        }

        function addToCart(product) {
            const existing = cart.find(item => item.id === product.id);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            showToast(`เพิ่ม ${product.variant_name} ลงตะกร้าแล้ว`);
            updateCartUI();
        }

        function updateQuantity(id, delta) {
            const item = cart.find(i => i.id === id);
            if(item) {
                item.quantity += delta;
                if(item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
            }
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-container');
            const totalItemsEl = document.getElementById('cart-total-items');
            const totalPriceEl = document.getElementById('cart-total-price');
            const btnCheckout = document.getElementById('btn-checkout');
            const badge = document.getElementById('cart-badge');

            container.innerHTML = '';
            
            if (cart.length === 0) {
                container.innerHTML = '<div class="h-full flex flex-col items-center justify-center text-gray-400 py-20"><i class="fas fa-shopping-cart text-4xl mb-3 opacity-20"></i><p>ยังไม่มีสินค้า</p></div>';
                btnCheckout.disabled = true;
                badge.classList.add('hidden');
                totalItemsEl.innerText = '0 ชิ้น';
                totalPriceEl.innerText = '฿0.00';
                return;
            }

            let totalQty = 0;
            let totalPrice = 0;

            cart.forEach(item => {
                totalQty += item.quantity;
                totalPrice += (item.price * item.quantity);

                const div = document.createElement('div');
                div.className = 'bg-white p-3 rounded-xl border border-gray-100 shadow-sm flex flex-col';
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-sm font-medium text-gray-800 pr-4 leading-tight">${item.variant_name}</span>
                        <button onclick="updateQuantity('${item.id}', -999)" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="flex justify-between items-center mt-1">
                        <span class="font-bold text-orange-600 text-sm">${formatMoney(item.price * item.quantity)}</span>
                        <div class="flex items-center bg-gray-100 rounded-lg">
                            <button onclick="updateQuantity('${item.id}', -1)" class="w-8 h-8 flex items-center justify-center text-gray-600"><i class="fas fa-minus text-xs"></i></button>
                            <span class="w-6 text-center text-sm font-bold">${item.quantity}</span>
                            <button onclick="updateQuantity('${item.id}', 1)" class="w-8 h-8 flex items-center justify-center text-gray-600"><i class="fas fa-plus text-xs"></i></button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });

            totalItemsEl.innerText = `${totalQty} ชิ้น`;
            totalPriceEl.innerText = formatMoney(totalPrice);
            btnCheckout.disabled = false;
            
            badge.innerText = totalQty;
            badge.classList.remove('hidden');
        }

        // ==========================================
        // 5. ระบบ UI บนมือถือ (Tabs & Modal)
        // ==========================================
        function switchTab(tab) {
            const isProducts = tab === 'products';
            
            // สลับปุ่ม Tab
            document.getElementById('tab-products').className = `flex-1 py-3 text-center transition ${isProducts ? 'tab-active' : 'text-gray-500'}`;
            document.getElementById('tab-cart').className = `flex-1 py-3 text-center transition relative ${!isProducts ? 'tab-active' : 'text-gray-500'}`;
            
            // สลับเนื้อหา
            document.getElementById('view-products').classList.toggle('hidden', !isProducts);
            document.getElementById('view-cart').classList.toggle('hidden', isProducts);
        }

        function openCheckoutModal() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('modal-total-price').innerText = formatMoney(total);
            
            const modal = document.getElementById('checkout-modal');
            const panel = document.getElementById('checkout-panel');
            modal.classList.remove('hidden');
            // ทำ Animation เด้งขึ้นมาจากขอบจอล่าง
            setTimeout(() => { panel.classList.remove('translate-y-full'); }, 10);
        }

        function closeCheckoutModal() {
            const modal = document.getElementById('checkout-modal');
            const panel = document.getElementById('checkout-panel');
            panel.classList.add('translate-y-full');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        // ==========================================
        // 6. ระบบบันทึกการขายลงฐานข้อมูล
        // ==========================================
        async function processCheckout(paymentMethod) {
            if(cart.length === 0 || !currentUser) return;
            
            const btn = document.getElementById('btn-checkout');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังบันทึก...';
            btn.disabled = true;

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            try {
                // 1. บันทึกหัวบิล (Trigger สร้างเลขบิลให้เอง)
                const { data: saleData, error: saleError } = await supabase
                    .from('sales')
                    .insert({
                        invoice_number: `T-${Date.now()}`, // ใส่ชั่วคราวให้ผ่าน Not Null เดี๋ยว Trigger ทับเอง
                        cashier_id: currentUser.id,
                        subtotal: total,
                        total_amount: total,
                        payment_method: paymentMethod
                    })
                    .select()
                    .single();

                if (saleError) throw saleError;

                // 2. บันทึกรายการสินค้าในบิล
                const items = cart.map(item => ({
                    sale_id: saleData.id,
                    variant_id: item.id,
                    quantity: item.quantity,
                    unit_price: item.price,
                    total_price: item.price * item.quantity
                }));
                const { error: itemsError } = await supabase.from('sale_items').insert(items);
                if (itemsError) throw itemsError;

                // 3. บันทึกตัดสต็อก (Trigger จะไปลดสต็อกให้เอง)
                const txs = cart.map(item => ({
                    variant_id: item.id,
                    transaction_type: 'SALE',
                    quantity: -item.quantity, // ติดลบคือขายออก
                    reference_id: saleData.id,
                    created_by: currentUser.id,
                    notes: 'Mobile POS Sale'
                }));
                const { error: invError } = await supabase.from('inventory_transactions').insert(txs);
                if (invError) throw invError;

                // สำเร็จ!
                closeCheckoutModal();
                cart = [];
                updateCartUI();
                switchTab('products');
                fetchProducts(); // โหลดสต็อกใหม่
                
                alert(`สำเร็จ! ชำระเงินเรียบร้อยแล้ว\nเลขที่บิล: ${saleData.invoice_number}`);

            } catch (err) {
                showToast(err.message, true);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // เริ่มต้นตรวจสอบเมื่อโหลดหน้าเว็บ
        window.onload = checkSession;
    </script>
</body>
</html>
